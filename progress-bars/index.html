<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Progress Bars Throughout History</title>
  <meta name="viewport" content="width=900" />

  <!-- ============================================================
       Player chrome + shared keyframes.
       Per-bar visuals live inside each bar module (bars/*.js).
       ============================================================ -->
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <!-- ============================================================
       Player UI
       ============================================================ -->
  <header class="header">
    <h1>Progress Bars Throughout History</h1>
    <div class="subtitle">1971 - 2026 · A Visual Catalog</div>
  </header>

  <main class="stage">
    <div class="ui-name" id="uiName">-</div>

    <div class="canvas-wrap">
      <div class="canvas" id="canvas"></div>
    </div>

    <div class="year" id="year">-</div>

    <div class="controls">
      <button id="btnPrev" title="Previous (←)">⏮</button>
      <button id="btnPlay" title="Pause / Play (Space)">⏸</button>
      <button id="btnNext" title="Next (→)">⏭</button>
      <div class="timeline"><div class="timeline-fill" id="timeline"></div></div>
      <div class="counter" id="counter">- / -</div>
    </div>

    <div class="footnote">10 seconds per bar · Sorted chronologically · CLI before GUI within the same year</div>
  </main>

  <!-- ============================================================
       Player engine. Defines window.PBH.
       Must come before any bar modules so PBH.registerBar exists.
       ============================================================ -->
  <script src="js/player.js"></script>

  <!-- ============================================================
       Bar modules. Order does not matter - the player sorts
       chronologically (year asc → CLI before GUI → name asc).
       Adding a new era? Drop a file in bars/ and add a tag below.
       ============================================================ -->
